<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="https://cdn.autodesk.io/favicon.ico">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.css">
    <link rel="stylesheet" href="/main.css">
    <title>Autodesk Platform Services: Simple Viewer</title>
</head>

<body>
    <div id="header">
        <img class="logo" src="https://cdn.autodesk.io/logo/black/stacked.png" alt="Autodesk Platform Services">
        <span class="title">Simple Viewer</span>
        <select name="models" id="models"></select>
        <button id="upload" title="Upload New Model">Upload</button>
        <input style="display: none" type="file" id="input">
    </div>
    <div id="preview"></div>
    <div id="overlay"></div>

    <div id="annotation-panel">
        <div class="panel-columns">
            <div class="panel-col">
                <h4 style="display: flex; justify-content: space-between; align-items: center;">
                    <span>2D Markups</span>
                    <span id="markup-status-badge"
                        style="font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #888;">VIEWING</span>
                </h4>
                <button id="btn-draw-arrow">Draw Arrow</button>
                <button id="btn-add-text">Add Text</button>
                <button id="btn-save-markup">Save 2D Markup</button>
            </div>
            <div class="panel-col">
                <h4>3D Object Pins (DataVisualization)</h4>
                <button id="btn-drop-pin">Drop 3D Pin</button>
            </div>
        </div>
        <div class="panel-bottom">
            <button id="btn-clear-canvas">Clear Canvas</button>
            <button id="btn-reload-render">Reload & Render All Stored Comments</button>
        </div>
    </div>

    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.js"></script>
    <script src="/main.js" type="module"></script>
</body>

</html>
